{% extends 'times/base.html' %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirmar Exclusão</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Tem certeza que deseja excluir o time</p>
                <p class="fs-4 fw-bold">{{ time }}</p>
                <p class="text-muted">Essa ação não pode ser desfeita.</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Sim, excluir</button>
                    <a href="{% url 'listar_times' %}" class="btn btn-secondary px-4">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
