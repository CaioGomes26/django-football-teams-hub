{% extends 'times/base.html' %}

{% block title %}Início{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <h1 class="mb-1">⚽ Football Teams Hub</h1>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">O que deseja fazer?</h5>

                <div class="d-grid gap-3">
                    <a href="{% url 'listar_times' %}" class="btn btn-primary">
                        📋 Ver todos os times
                    </a>
                    <a href="{% url 'cadastrar_time' %}" class="btn btn-success">
                        ➕ Cadastrar novo time
                    </a>
                    <a href="/admin/" class="btn btn-outline-secondary">
                        ⚙️ Painel administrativo
                    </a>
                </div>

                <hr class="my-4">
                <p class="text-muted mb-0">Times cadastrados: <strong>{{ total_times }}</strong></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
